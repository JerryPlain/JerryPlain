name: Profile Metrics

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/profile-metrics.yml

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate overview card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN != '' && secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ github.token }}
          user: ${{ github.repository_owner }}
          filename: assets/github-metrics-overview.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh profile metrics [skip ci]"
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          config_display: large
          plugin_isocalendar: no
          plugin_habits: no
          plugin_calendar: no

      - name: Generate contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN != '' && secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ github.token }}
          user: ${{ github.repository_owner }}
          filename: assets/github-metrics-calendar.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh profile metrics [skip ci]"
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Generate habits card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN != '' && secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ github.token }}
          user: ${{ github.repository_owner }}
          filename: assets/github-metrics-habits.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: refresh profile metrics [skip ci]"
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
