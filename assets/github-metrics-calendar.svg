<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Contribution Calendar Placeholder</title>
  <desc id="desc">This card will be generated automatically by the Profile Metrics workflow after it runs.</desc>
  <rect width="420" height="320" rx="24" fill="#f8fafc"/>
  <rect x="16" y="16" width="388" height="288" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="34" y="86" fill="#0f172a" font-family="Verdana, DejaVu Sans, sans-serif" font-size="28" font-weight="700">
    Contribution calendar
  </text>
  <text x="34" y="136" fill="#475569" font-family="Verdana, DejaVu Sans, sans-serif" font-size="18">
    This card is generated in-repo.
  </text>
  <text x="34" y="168" fill="#475569" font-family="Verdana, DejaVu Sans, sans-serif" font-size="18">
    It refreshes every 30 minutes.
  </text>
  <text x="34" y="220" fill="#0ea5e9" font-family="Verdana, DejaVu Sans, sans-serif" font-size="18" font-weight="700">
    GitHub contributions may still lag up to 24 hours.
  </text>
</svg>
